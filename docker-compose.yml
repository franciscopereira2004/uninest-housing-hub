# NOTA: este compose serve APENAS para testar localmente o build de produção
# (imagem multi-stage com Fastify a servir também o frontend estático).
# NÃO usar para desenvolvimento — em dev continua-se a correr `npm run dev` num
# terminal e `npm --prefix backend run dev` noutro (Vite + tsx watch separados).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      SERVE_FRONTEND: "true"
      PORT: 8080
      USE_IN_MEMORY_DB: "true"
      BLOB_USE_MOCK: "true"
      JWT_SECRET: change-me-in-production
    restart: unless-stopped
